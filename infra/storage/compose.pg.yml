services:
  postgres:
    build:
      dockerfile: build/Dockerfile
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432"
    networks:
      - comm-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U User -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: